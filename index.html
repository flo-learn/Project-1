<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A polished hello world page." />
    <title>Hello, World!</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #f6f7ff;
        --muted: #b9bed9;
        --line: rgba(255, 255, 255, 0.14);
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 15% 20%, #5533b7 0, transparent 30rem),
          radial-gradient(circle at 85% 75%, #007f86 0, transparent 28rem),
          linear-gradient(135deg, #101327 0%, #1b1440 50%, #071d2c 100%);
      }

      nav {
        position: fixed;
        top: 1.4rem;
        display: flex;
        gap: 0.35rem;
        padding: 0.35rem;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(13, 17, 43, 0.46);
        backdrop-filter: blur(14px);
        z-index: 1;
      }
      nav a { padding: 0.5rem 0.85rem; border-radius: 999px; color: var(--muted); font-size: 0.9rem; font-weight: 700; text-decoration: none; }
      nav a:hover, nav a[aria-current="page"] { color: var(--ink); background: rgba(255,255,255,.12); }

      .orb {
        position: fixed;
        width: 18rem;
        aspect-ratio: 1;
        border-radius: 50%;
        filter: blur(3px);
        opacity: 0.35;
        animation: float 10s ease-in-out infinite alternate;
      }

      .orb.one { top: -7rem; right: -4rem; background: #a555f7; }
      .orb.two { bottom: -9rem; left: -5rem; background: #20d8c5; animation-delay: -4s; }

      main {
        width: min(90vw, 760px);
        padding: clamp(2rem, 7vw, 5rem);
        text-align: center;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: rgba(13, 17, 43, 0.48);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35), inset 0 1px rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(18px);
        animation: appear 700ms cubic-bezier(.2,.8,.2,1) both;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        padding: 0.45rem 0.85rem;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: #dbddff;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.09em;
        text-transform: uppercase;
      }

      .dot { width: 0.55rem; height: 0.55rem; border-radius: 50%; background: #63f5bd; box-shadow: 0 0 14px #63f5bd; }

      h1 {
        margin: 1.5rem 0 1rem;
        font-size: clamp(3rem, 10vw, 6.5rem);
        line-height: 0.95;
        letter-spacing: -0.075em;
        background: linear-gradient(105deg, #ffffff 18%, #b9c9ff 50%, #87f8e7 88%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      p { max-width: 35rem; margin: 0 auto; color: var(--muted); font-size: clamp(1rem, 2vw, 1.18rem); line-height: 1.65; }

      .button {
        display: inline-block;
        margin-top: 2rem;
        padding: 0.85rem 1.25rem;
        border-radius: 12px;
        background: linear-gradient(135deg, #8a68ff, #34d6c2);
        color: #071328;
        font-weight: 800;
        text-decoration: none;
        box-shadow: 0 10px 30px rgba(73, 174, 210, 0.25);
        transition: transform 180ms ease, box-shadow 180ms ease;
      }
      .button:hover { transform: translateY(-3px); box-shadow: 0 16px 36px rgba(73, 174, 210, 0.38); }

      @keyframes appear { from { opacity: 0; transform: translateY(20px) scale(.98); } to { opacity: 1; transform: none; } }
      @keyframes float { to { transform: translate(2rem, 1.5rem) scale(1.12); } }
      @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
    </style>
  </head>
  <body>
    <div class="orb one" aria-hidden="true"></div>
    <div class="orb two" aria-hidden="true"></div>
    <nav aria-label="Main navigation">
      <a href="index.html" aria-current="page">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
    <main>
      <div class="eyebrow"><span class="dot"></span> System online</div>
      <h1>Hello, World!</h1>
      <p>A small beginning with a little extra sparkle. Your new web page is ready for whatever comes next.</p>
      <a class="button" href="about.html">Meet the project →</a>
    </main>
  </body>
</html>
